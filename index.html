<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotation | Grace Heat Setting</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container pattern-bg">
      <div class="card">
        <!-- HEADER -->
        <header class="header">
          <div class="header-main">
            <h1>GRACE HEAT SETTING</h1>
            <p class="subtitle">No. 440/1, Ganapathy Nagar, Tirupur</p>
          </div>
          <div class="contact-info">
            <span class="badge"
              ><i class="ph ph-receipt"></i> GSTIN: 33AGSPV1959K1ZK</span
            >
            <span class="badge"
              ><i class="ph ph-phone"></i> Mob: (+91) 98435 45888</span
            >
          </div>
        </header>

        <hr class="divider" />

        <!-- INFO SECTION -->
        <section class="info-section">
          <div class="input-group">
            <label for="date-input">Date</label>
            <div class="input-wrapper">
              <i class="ph ph-calendar-blank"></i>
              <input type="date" id="date-input" />
            </div>
          </div>
          <div class="input-group to-group">
            <label for="to-input">To</label>
            <div class="input-wrapper">
              <i class="ph ph-user"></i>
              <input
                type="text"
                id="to-input"
                placeholder="Enter recipient name / company"
              />
            </div>
          </div>
          <div class="input-group">
            <label for="address">Address</label>
            <div class="input-wrapper">
              <i class="ph ph-map-pin"></i>
              <textarea
                id="address"
                class="desc-input"
                rows="3"
                placeholder="Enter full address"
              ></textarea>
            </div>
          </div>
        </section>

        <!-- INTRODUCTION -->
        <section class="intro">
          <p>Dear Sir/Madam,</p>
          <h3>MY RATE QUOTATION FOR HEAT SETTING CHARGES</h3>
        </section>

        <!-- TABLE -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Description</th>
                <th width="18%">Rate/Kg (₹)</th>
                <th width="10%" class="actions-header">Action</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr>
                <td>
                  <textarea
                    class="desc-input"
                    rows="1"
                    placeholder="Enter description..."
                  ></textarea>
                </td>
                <td>
                  <input type="number" class="rate" placeholder="0" min="0" />
                </td>
                <td class="actions-cell">
                  <button
                    class="icon-btn delete-btn"
                    onclick="deleteRow(this)"
                    title="Delete Row"
                  >
                    <i class="ph ph-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <button class="btn btn-secondary" onclick="addRow()">
          <i class="ph ph-plus-circle"></i> Add Row
        </button>

        <!-- GST SECTION -->
        <section class="gst-section">
          <div class="input-group">
            <label for="gst-input">GST Number</label>
            <div class="input-wrapper">
              <i class="ph ph-receipt"></i>
              <input
                type="text"
                id="gst-input"
                placeholder="Enter GST number"
              />
            </div>
          </div>
        </section>

        <!-- BANK DETAILS -->
        <section class="bank-section">
          <h3>Bank Details</h3>
          <div class="input-group">
            <label for="account-name">Account Name</label>
            <div class="input-wrapper">
              <i class="ph ph-user"></i>
              <input
                type="text"
                id="account-name"
                placeholder="Enter account name"
              />
            </div>
          </div>
          <div class="input-group">
            <label for="account-number">Account Number</label>
            <div class="input-wrapper">
              <i class="ph ph-credit-card"></i>
              <input
                type="text"
                id="account-number"
                placeholder="Enter account number"
              />
            </div>
          </div>
          <div class="input-group">
            <label for="ifsc">IFSC Code</label>
            <div class="input-wrapper">
              <i class="ph ph-code"></i>
              <input type="text" id="ifsc" placeholder="Enter IFSC code" />
            </div>
          </div>
          <div class="input-group">
            <label for="branch">Branch</label>
            <div class="input-wrapper">
              <i class="ph ph-building"></i>
              <input type="text" id="branch" placeholder="Enter branch" />
            </div>
          </div>
        </section>
        <footer class="footer">
          <div class="signatures">
            <div class="sign-block">
              <p class="regards">Regards,</p>
              <p class="name">Vimal</p>
            </div>
            <div class="sign-block seal">
              <div class="seal-space"></div>
              <p>Authorized Signature & Seal</p>
            </div>
          </div>
          <p class="thank-you">Thank you for your business!</p>
        </footer>

        <!-- FLOATING PRINT BUTTON -->
        <button
          class="btn btn-primary print-fab"
          onclick="window.print()"
          title="Print Document"
        >
          <i class="ph ph-printer"></i> Print
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
